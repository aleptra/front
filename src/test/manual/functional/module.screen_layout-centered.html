<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Module.Screen: Layout Centered Test</title>
  <script src="../../../front.js" module="screen" conf="debug:true"></script>
  <style>
    body {
      background: #f0f0f0;
    }
    main {
      border: 2px solid #333;
      padding: 2rem;
      background: #4CAF50;
      color: white;
      text-align: center;
      max-width: 400px;
    }
  </style>
</head>
<body screen-layout="centered">
  <main>
    <h1>Centered Content</h1>
    <p>This content is centered both vertically and horizontally</p>
  </main>
</body>
</html>
