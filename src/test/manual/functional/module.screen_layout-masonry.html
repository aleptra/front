<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Layout: Masonry Test</title>
  <script src="../../../front.js" module="screen" conf="debug:true"></script>
  <style>
    body {
      padding: 1rem;
    }
    body > div {
      border: 2px solid #333;
      padding: 2rem;
      background: #4CAF50;
      color: white;
      text-align: center;
      min-height: 150px;
    }
  </style>
</head>
<body screen-layout="masonry">
  <div>Card 1</div>
  <div>Card 2</div>
  <div>Card 3</div>
  <div>Card 4</div>
  <div>Card 5</div>
  <div>Card 6</div>
</body>
</html>
