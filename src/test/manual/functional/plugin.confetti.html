<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Confetti Plugin Test</title>
  <script src="../../../front.js" plugin="confetti"></script>
</head>
<body>
  <h1>Confetti Plugin Test</h1>

  <h3>Color confetti (no images)</h3>
  <div confetti--load confetti-count="50" confetti-size="10" confetti-speed="2" width="100%" height="400px" border="1px solid #ccc" bgcolor="#111"></div>

  <h3>Custom colors</h3>
  <div confetti--load confetti-colors="#ff0000;#ffffff" confetti-count="30" confetti-size="12" confetti-speed="1.5" width="100%" height="400px" border="1px solid #ccc" bgcolor="#222"></div>

  <h3>Image confetti</h3>
  <div confetti--load confetti-src="https://upload.wikimedia.org/wikipedia/commons/thumb/8/8a/Banana-Single.jpg/40px-Banana-Single.jpg" confetti-count="20" confetti-size="30" confetti-speed="2" width="100%" height="400px" border="1px solid #ccc"></div>

</body>
</html>
